<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shants PDF Tools</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .nav {
      background: #111827;
      color: white;
      padding: 15px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

 .card {
  display: block;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-decoration: none;
  color: black;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: transform 0.2s ease;
  cursor: pointer;
}

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2,
    .card p {
      margin: 0 0 10px 0;
    }

    .card p {
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="nav">Shants PDF Tools</div>

  <div class="container">
    <h1>PDF Tools</h1>

   <div class="grid">
  <a href="merge.html" class="card">
    <h2>Merge PDF</h2>
    <p>Combine multiple PDFs</p>
  </a>
</div>
  </div>
</body>
</html>
