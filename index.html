<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shants Cloud Consulting | AWS Cloud Migration</title>

<style>
/* KEEP ALL YOUR EXISTING CSS — only ADD BELOW */

.quiz input, .quiz select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid rgba(96,165,250,0.3);
  background: #020617;
  color: white;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: rgba(17,24,39,0.9);
  border: 1px solid rgba(96,165,250,0.3);
  display: none;
}
</style>
</head>

<body>

<!-- KEEP EVERYTHING ABOVE THE CONTACT SECTION -->

<section id="contact" class="section">
  <h2>Free Cloud Savings Calculator</h2>
  <p>Answer a few quick questions to estimate your potential AWS savings.</p>

  <div class="contact-form quiz">

    <input id="cost" type="number" placeholder="Monthly IT Cost ($)">
    
    <input id="employees" type="number" placeholder="Number of Employees">

    <select id="servers">
      <option value="">Number of Servers</option>
      <option value="1">1-2</option>
      <option value="3">3-5</option>
      <option value="6">6+</option>
    </select>

    <select id="downtime">
      <option value="">Downtime Frequency</option>
      <option value="low">Rare</option>
      <option value="med">Monthly Issues</option>
      <option value="high">Frequent Problems</option>
    </select>

    <button class="cta" onclick="calculateSavings()">Calculate Savings</button>

    <div id="result" class="result-box"></div>

  </div>
</section>

<script>
function calculateSavings() {
  let cost = parseFloat(document.getElementById('cost').value) || 0;
  let servers = document.getElementById('servers').value;
  let downtime = document.getElementById('downtime').value;

  let baseSavings = 0.25; // 25% baseline

  if (servers >= 3) baseSavings += 0.10;
  if (servers >= 6) baseSavings += 0.10;

  if (downtime === "high") baseSavings += 0.15;
  if (downtime === "med") baseSavings += 0.08;

  let low = Math.round(cost * baseSavings * 0.8);
  let high = Math.round(cost * baseSavings * 1.2);

  let resultBox = document.getElementById('result');

  resultBox.style.display = "block";
  resultBox.innerHTML = `
    <h3>Estimated Monthly Savings</h3>
    <p><strong>$${low} - $${high}</strong></p>
    <p>Potential improvement in uptime and performance.</p>
    <br>
    <p><strong>Next Step:</strong> Get a full AWS migration plan tailored to your business.</p>
    <a href="#final" class="cta">Request Full Assessment</a>
  `;
}
</script>

<!-- KEEP YOUR FINAL CTA -->
